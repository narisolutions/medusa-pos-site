<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6d28d9" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#6d28d9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative hexagon outlines -->
  <g opacity="0.06" transform="translate(900, 120) scale(0.8)">
    <path d="M150 0L280 75V225L150 300L20 225V75Z" stroke="#6d28d9" stroke-width="1" fill="none"/>
  </g>
  <g opacity="0.04" transform="translate(100, 400) scale(0.5)">
    <path d="M150 0L280 75V225L150 300L20 225V75Z" stroke="#6d28d9" stroke-width="1" fill="none"/>
  </g>
  <g opacity="0.03" transform="translate(950, 350) scale(0.4)">
    <path d="M150 0L280 75V225L150 300L20 225V75Z" stroke="#6d28d9" stroke-width="1" fill="none"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line-grad)"/>

  <!-- Logo hexagon -->
  <g transform="translate(536, 160) scale(0.14)">
    <path d="M339.515 81.9665L254.329 32.9564C226.457 16.8812 192.304 16.8812 164.431 32.9564L78.8524 81.9665C51.3731 98.0412 34.1003 127.839 34.1003 159.598V258.01C34.1003 290.161 51.3731 319.566 78.8524 335.642L164.039 385.043C191.911 401.119 226.064 401.119 253.936 385.043L339.122 335.642C366.994 319.566 383.875 290.161 383.875 258.01V159.598C384.66 127.839 367.387 98.0412 339.515 81.9665ZM209.184 296.434C160.899 296.434 121.642 257.225 121.642 209C121.642 160.774 160.899 121.566 209.184 121.566C257.469 121.566 297.118 160.774 297.118 209C297.118 257.225 257.862 296.434 209.184 296.434Z" fill="#6d28d9"/>
  </g>

  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="-2">
    Medusa POS
  </text>

  <!-- Divider -->
  <rect x="540" y="345" width="120" height="2" rx="1" fill="#6d28d9" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="26" fill="#a1a1aa" letter-spacing="1">
    Point of Sale for MedusaJS
  </text>

  <!-- Platform tags -->
  <g transform="translate(420, 430)">
    <rect x="0" y="0" width="100" height="30" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="50" y="20" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#a1a1aa">Windows</text>

    <rect x="120" y="0" width="100" height="30" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="170" y="20" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#a1a1aa">macOS</text>

    <rect x="240" y="0" width="100" height="30" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="290" y="20" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#a1a1aa">Linux</text>
  </g>

  <!-- Bottom domain -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="16" fill="#6d28d9" opacity="0.7" letter-spacing="2">
    narisolutions.github.io
  </text>

  <!-- Accent line bottom -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#line-grad)"/>
</svg>
